# Ten sam cykl co w Jenkinsfile, ale w GitHub Actions.
# Cel: kursanci widza te same etapy (lint -> test -> build -> deploy/smoke)
# zapisane innym narzedziem i moga porownac.

name: CI

# Wyzwalacze. W Jenkinsie robilismy polling co 5 minut; tutaj GitHub
# uruchamia workflow OD RAZU po pushu - bez odpytywania repo.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:   # reczne uruchomienie (odpowiednik "Buduj teraz")

jobs:

  # --- 1. Lint (odpowiednik "Clean Code / Sonar") ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check .

  # --- 2. Testy na kilku wersjach Pythona naraz ---
  # To "matryca" - w Jenkinsie trzeba by recznie robic osobne joby/agenty,
  # tutaj wystarczy lista wersji.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install . -r requirements.txt
      - run: pytest --junitxml=report.xml
      # Raport JUnit ladujemy jako artefakt. Uwaga: GitHub nie renderuje go
      # w UI tak ladnie jak plugin JUnit w Jenkinsie - do tego trzeba dodatkowej
      # akcji (np. dorny/test-reporter). To dobra roznica do pokazania grupie.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: report.xml

  # --- 3. Build artefaktu + deploy lokalny + smoke test ---
  # `needs` = odpowiednik "projektu zaleznego" z Jenkinsa: ten job rusza
  # dopiero, gdy lint i test przejda.
  build-and-smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install . build
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
      - name: Deploy lokalny + smoke test
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:8000/health
          kill $APP_PID || true

# Uwaga: numery wersji akcji (np. @v6, @v4) z czasem rosna. Dobra praktyka
# to przypiac major i co jakis czas go podbic (np. Dependabotem).
